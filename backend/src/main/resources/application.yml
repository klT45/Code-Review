app:
  name: AI PR Review Assistant
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  github:
    private-repository-support-enabled: false
  model:
    default-provider-id: deepseek
    providers:
      - id: deepseek
        display-name: DeepSeek
        base-url: https://api.deepseek.com
        model-id: deepseek-chat
        api-key-env: DEEPSEEK_API_KEY
      - id: custom
        display-name: Custom compatible model
        base-url: https://api.deepseek.com
        model-id: deepseek-chat
        api-key-env: AI_MODEL_API_KEY

server:
  port: 8080

spring:
  application:
    name: ai-pr-review-assistant
